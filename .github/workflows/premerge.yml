name: WBC-AGILE premerge
on:
  pull_request:
    branches: [main]
# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  ## ------------------------------------------
  ## Linting and formatting (pre-commit)
  ## ------------------------------------------
  lint_precommit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
  ## ------------------------------------------
  ## DCO sign-off check
  ## ------------------------------------------
  dco_check:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on all PR commits
        run: |
          echo "Checking DCO sign-off for commits in this PR..."
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          FAILED=0
          for SHA in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            MSG=$(git log -1 --format='%B' "$SHA")
            if ! echo "$MSG" | grep -qiE '^Signed-off-by: .+ <.+>'; then
              echo "::error::Commit $SHA is missing DCO sign-off (Signed-off-by)."
              echo "  Subject: $(git log -1 --format='%s' "$SHA")"
              echo "  Author:  $(git log -1 --format='%an <%ae>' "$SHA")"
              FAILED=1
            else
              echo "OK: $SHA"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more commits are missing 'Signed-off-by'. Please amend with:"
            echo "  git commit --amend -s"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi
          echo "All commits have DCO sign-off."
  ## ------------------------------------------
  ## Build & Test (GPU required)
  ## ------------------------------------------
  build_and_test:
    name: Build & Test
    needs: [lint_precommit]
    runs-on: [self-hosted, gpu]
    timeout-minutes: 180
    env:
      DOCKER_IMAGE: agile-ci-${{ github.run_id }}
      NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
      - name: NGC Login
        run: |
          if [ -n "$NGC_API_KEY" ]; then
            echo "Logging into NGC registry..."
            docker login -u \$oauthtoken -p $NGC_API_KEY nvcr.io
            echo "Successfully logged into NGC registry"
          else
            echo "NGC_API_KEY not available - skipping NGC login"
          fi
      - name: Build Docker image
        run: |
          echo "::group::Build Docker image"
          time docker build -f workflows/Dockerfile -t $DOCKER_IMAGE .
          echo "::endgroup::"
      - name: Run unit tests
        run: |
          echo "::group::Unit Tests"
          docker run --name agile-unit-tests-${{ github.run_id }} \
            --entrypoint bash --gpus all --network=host \
            -e ACCEPT_EULA=Y \
            -e OMNI_KIT_ACCEPT_EULA=yes \
            -e OMNI_KIT_DISABLE_CUP=1 \
            -e ISAAC_SIM_HEADLESS=1 \
            -e ISAAC_SIM_LOW_MEMORY=1 \
            -e WANDB_MODE=disabled \
            -e CI=true \
            -e PYTHONUNBUFFERED=1 \
            $DOCKER_IMAGE \
            -c "./tests/run_unit_tests.sh"
          echo "::endgroup::"
      - name: Run E2E tests
        run: |
          echo "::group::E2E Tests"
          docker run --name agile-e2e-tests-${{ github.run_id }} \
            --entrypoint bash --gpus all --network=host \
            -e ACCEPT_EULA=Y \
            -e OMNI_KIT_ACCEPT_EULA=yes \
            -e OMNI_KIT_DISABLE_CUP=1 \
            -e ISAAC_SIM_HEADLESS=1 \
            -e ISAAC_SIM_LOW_MEMORY=1 \
            -e WANDB_MODE=disabled \
            -e CI=true \
            -e PYTHONUNBUFFERED=1 \
            $DOCKER_IMAGE \
            -c "\${ISAACLAB_PATH}/isaaclab.sh -p -m pytest tests/test_all_tasks_e2e.py -v"
          echo "::endgroup::"
      - name: Run Sim2Mujoco tests
        run: |
          echo "::group::Sim2Mujoco Tests"
          docker run --name agile-sim2mujoco-tests-${{ github.run_id }} \
            --entrypoint bash --gpus all --network=host \
            -e ACCEPT_EULA=Y \
            -e OMNI_KIT_ACCEPT_EULA=yes \
            -e OMNI_KIT_DISABLE_CUP=1 \
            -e ISAAC_SIM_HEADLESS=1 \
            -e ISAAC_SIM_LOW_MEMORY=1 \
            -e WANDB_MODE=disabled \
            -e CI=true \
            -e PYTHONUNBUFFERED=1 \
            $DOCKER_IMAGE \
            -c "\${ISAACLAB_PATH}/isaaclab.sh -p -m pytest tests/test_sim2mujoco_e2e.py -v"
          echo "::endgroup::"
      - name: Cleanup
        if: always()
        run: |
          docker rm agile-unit-tests-${{ github.run_id }} 2>/dev/null || true
          docker rm agile-e2e-tests-${{ github.run_id }} 2>/dev/null || true
          docker rm agile-sim2mujoco-tests-${{ github.run_id }} 2>/dev/null || true
          docker rmi $DOCKER_IMAGE 2>/dev/null || true
